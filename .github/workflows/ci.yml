# Engineering CI surface per ADR-023 §Axis 1.
#
# This is the V1 PR #1 skeleton: one test job on linux/macOS/windows + one ci-gate
# aggregator. The 5-platform Rust PTY sidecar matrix and the explicit two-ABI rebuild
# step land in later PRs (no sidecar source yet; no Electron installed yet).
#
# Default workflow permissions are read-only; per-job permissions opt up to write
# only where required. Event-split concurrency: PR runs cancel-in-progress, integration
# branch (develop, main) runs do not.
#
# Branch protection on develop and main MUST require the `ci-gate` job (only). Matrix
# leg names embed strategy values and are not stable required-check targets per
# https://github.com/orgs/community/discussions/26822.

name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

jobs:
  test:
    name: test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Per ADR-023 §Axis 1 drift correction: macos-13 fully deprecated 2025-12-04.
        # macos-15-intel is the last x86_64 macOS runner (supported through Aug 2027).
        # PR #1 keeps the matrix small (one OS, one node tier) until later PRs widen it.
        os: [ubuntu-latest]
        node: ["22.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lefthook parity (close --no-verify bypass)
        run: pnpm exec lefthook run pre-commit --all-files

      - name: Build
        run: pnpm turbo run build

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Test
        run: pnpm turbo run test

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Aggregate required-checks status
        # Aggregator-job pattern per ADR-023 §Axis 1 (and the canonical GitHub
        # Community Discussion #26822 recipe). Branch protection requires this
        # single job; renaming or adding matrix legs cannot silently bypass.
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "ci-gate: required job 'test' did not succeed (result=${{ needs.test.result }})"
            exit 1
          fi
          echo "ci-gate: all required jobs succeeded"
