# Gitleaks v8.30+ secret scan per ADR-023 §Axis 4 (sub-axis 4).
#
# MIT-licensed (compatible with Apache-2.0 OSS posture per ADR-020), used as the
# CI-side complement to the local lefthook gitleaks step. GitHub native secret
# scanning + push protection (free in public repos) is the primary defense; this
# workflow is the paranoid-belt-and-suspenders second pass.

name: Secret Scan

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

# Mirror ci.yml event-split concurrency: PR runs cancel-in-progress on superseding
# pushes; integration branch (develop, main) runs queue serially.
concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for delta scan)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # SHA-pinned per ADR-023 §Axis 4 supply-chain hygiene; Renovate's
        # helpers:pinGitHubActionDigests preset (renovate.json5) keeps this current.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for OSS / public repos.
          # WARNING: making this repo private requires registering a
          # GITLEAKS_LICENSE secret first; this job will start failing without it.
