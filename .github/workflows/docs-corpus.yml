# Doc-corpus integrity CI gate. Pre-commit checks staged-impact-only; this
# workflow runs the full sweep on every PR and develop/main push so:
#   (a) findings that escape pre-commit (`--no-verify` bypass) are caught
#       before merge — closing ADR-023 §Axis 2 D-1 for doc-corpus checks;
#   (b) lychee's HTTP probes (skipped at pre-commit) run against the canonical
#       internet view of every external link.
#
# Branch protection on develop and main MUST require the `docs-corpus-gate`
# job (only). Per ADR-023 §Axis 1 individual matrix legs are not stable
# required-check targets — the aggregator pattern is.

name: docs-corpus

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lychee:
    name: lychee — inbound anchors + outbound links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run lychee
        # SHA-pin per ADR-023 §Axis 4 supply-chain hygiene; Renovate's
        # helpers:pinGitHubActionDigests preset keeps this current.
        uses: lycheeverse/lychee-action@v2
        with:
          # Pin the lychee binary to match `tools/install-lychee.mjs` (local
          # pre-commit). The action's default trails (currently v0.23.0); without
          # this pin, `.lychee.toml`'s `include_fragments = "full"` (string form,
          # introduced post-v0.23) would parse-fail in CI even though it passes
          # locally. ADR-023 §Axis 2 D-1: CI parity for pre-commit checks.
          lycheeVersion: "v0.24.2"
          args: >-
            --no-progress --config .lychee.toml --base . --verbose './**/*.md'

          fail: true

  custom-checks:
    name: custom hooks — mermaid + cite + path-ripple + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@8b2eead6074fefa43a68bf4c9e0f03ea4126b5ba # v6.0.3
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.12"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: docs-corpus checks (full repo)
        # Single runner composing path-canonical-ripple + mermaid-set-coherence +
        # cite-target-existence. The runner reads argv for per-file checks
        # (mermaid + cite, scoped to `.md`) and runs path-canonical-ripple
        # unconditionally (whole-repo grep via the registry's `scope` globs).
        run: |
          mapfile -t files < <(git ls-files '*.md' | grep -v '^docs/archive/' || true)
          node --experimental-strip-types tools/docs-corpus/bin/pre-commit-runner.ts "${files[@]}"

      - name: Unit tests for hook implementations
        run: pnpm exec vitest run --root tools/docs-corpus

  docs-corpus-gate:
    name: docs-corpus-gate
    runs-on: ubuntu-latest
    needs: [lychee, custom-checks]
    if: always()
    steps:
      - name: Aggregate required-checks status
        run: |
          fail=0
          if [[ "${{ needs.lychee.result }}" != "success" ]]; then
            echo "docs-corpus-gate: required job 'lychee' did not succeed (result=${{ needs.lychee.result }})"
            fail=1
          fi
          if [[ "${{ needs.custom-checks.result }}" != "success" ]]; then
            echo "docs-corpus-gate: required job 'custom-checks' did not succeed (result=${{ needs.custom-checks.result }})"
            fail=1
          fi
          if [[ $fail -ne 0 ]]; then
            exit 1
          fi
          echo "docs-corpus-gate: all required jobs succeeded"
