[package]
name = "sidecar-rust-pty"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
publish = false
description = "AI Sidekicks PTY sidecar binary (Plan-024)."
license = "Apache-2.0"

[[bin]]
name = "sidecar"
path = "src/main.rs"

[dependencies]
portable-pty = "0.9"
serde = { version = "1.0", features = ["derive"] }
serde_with = { version = "3.7", features = ["base64"] }
serde_json = "1.0"
tokio = { version = "1.40", features = ["rt-multi-thread", "macros", "process", "io-util", "io-std"] }
clap = { version = "4.5", features = ["derive"] }
