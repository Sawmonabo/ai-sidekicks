# lefthook 2.1.6 configuration per ADR-023 §Axis 2.
#
# Run hooks in parallel (Husky lacks this primitive — load-bearing for AI-implementer
# feedback latency per ADR-023 §Axis 2 Synthesis item 1).
#
# CI parity for the `git commit --no-verify` bypass closure (ADR-023 §Axis 2 D-1) is
# enforced via explicit `eslint .` + `prettier --check .` invocations in
# `.github/workflows/ci.yml`. lint-staged reads the git staging index, which is empty
# in a fresh CI checkout — running `lefthook run pre-commit --all-files` from CI
# would be an empirical no-op.

min_version: "2.1.6"

pre-commit:
  parallel: true
  jobs:
    - name: lint-staged
      run: pnpm exec lint-staged --concurrent false
      stage_fixed: true

    - name: gitleaks
      # `gitleaks protect --staged` was hidden in v8.19+ help and replaced by
      # `gitleaks git --pre-commit --staged`. ADR-023 mandates v8.30+, so use the
      # supported invocation. Sustains identical detection semantics on staged files.
      # Local install is required per CONTRIBUTING.md "Toolchain Setup" — emit
      # the install hint to stderr with a `WARNING:` prefix so missing-tool drift is
      # visible in pre-commit output without blocking the commit (CI gitleaks job is
      # the authoritative gate).
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks git --pre-commit --staged --no-banner --redact
        else
          echo "WARNING: gitleaks not installed locally; CI gitleaks job is the authoritative gate." >&2
          echo "WARNING: Install per CONTRIBUTING.md or https://github.com/gitleaks/gitleaks" >&2
        fi

    # Doc-corpus regression checks (extends ADR-023 §Axis 2 pre-commit chain).
    # Staged-impact-only to stay under the <1s typical / <5s p99 latency budget.
    # Full-repo sweep runs in CI (.github/workflows/docs-corpus.yml).
    # See docs/operations/failure-mode-catalog.md for the catalog these enforce.
    - name: docs-anchor-check
      # lychee — inbound `file.md#anchor` + outbound link verification.
      # `pnpm install` provisions lychee at node_modules/.bin/lychee via
      # tools/install-lychee.mjs (postinstall). The conditional remains
      # graceful: if `--ignore-scripts` was used, fresh-clone state without
      # `pnpm install` ran, etc., the WARNING surfaces and CI is the
      # authoritative gate.
      glob: "*.md"
      run: |
        if command -v lychee >/dev/null 2>&1; then
          lychee --offline --no-progress --config .lychee.toml {staged_files}
        elif [ -x node_modules/.bin/lychee ]; then
          node_modules/.bin/lychee --offline --no-progress --config .lychee.toml {staged_files}
        else
          echo "WARNING: lychee not installed locally; CI docs-corpus job is the authoritative gate." >&2
          echo "WARNING: Run 'pnpm install' to provision, or 'cargo install lychee' for a system install." >&2
        fi

    - name: docs-corpus-checks
      # Single dispatch script (tools/docs-corpus/bin/pre-commit-runner.ts) that
      # composes three lib/ checks: path-canonical-ripple (whole-repo sweep),
      # mermaid-set-coherence (PR #27 round 2 hard-signal), and
      # cite-target-existence (file.md:NNN truncation floor).
      run: node --experimental-strip-types tools/docs-corpus/bin/pre-commit-runner.ts {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
